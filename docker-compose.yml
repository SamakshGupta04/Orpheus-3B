# docker compose up --build
#
# Requires the NVIDIA Container Toolkit on the host (nvidia-ctk / nvidia-docker2)
# so `deploy.resources.reservations.devices` below can hand the container a GPU.
#
# AUTOSTART_MODELS=all (baked into the image) starts all three model servers
# warm on container start. Override per-run to start only a subset, e.g.:
#   AUTOSTART_MODELS=orpheus docker compose up
# or unset it entirely and start/stop models manually from the "Model
# Servers" panel in the app to keep VRAM usage to one model at a time.
#
# 8001/8002/8003 (per-model HTTP APIs, for direct testing e.g. via Postman)
# are published bound to 127.0.0.1 on the VM — reachable only via an SSH
# tunnel (ssh -L 8002:localhost:8002 ...), never from the open network. These
# endpoints have no auth, so don't widen that binding without adding some.
services:
  voice-cloning:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_VERSION: cu121
    ports:
      - "8518:8501"
      - "127.0.0.1:8001:8001"   # Model 1 (Orpheus) — currently disabled, harmless if unused
      - "127.0.0.1:8002:8002"   # Model 2 (VoxCPM2)
      - "127.0.0.1:8003:8003"   # Model 3 (VibeVoice) — currently disabled, harmless if unused
    environment:
      - AUTOSTART_MODELS=${AUTOSTART_MODELS:-all}
      - AUTOSTART_DRY_RUN=${AUTOSTART_DRY_RUN:-}
    volumes:
      - ./outputs:/app/outputs
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf-cache:
